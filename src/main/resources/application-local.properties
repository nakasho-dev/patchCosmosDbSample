# Local Development Profile Configuration
spring.application.name=patchCosmosDbSample-local

# CosmosDB Configuration for Local Development
# Cosmos DB Emulator (default local setup)
azure.cosmos.uri=${COSMOS_DB_URI:https://localhost:8081}
azure.cosmos.key=${COSMOS_DB_KEY:C2y6yDjf5/R+ob0N8A7Cgv30VRDJIWEHLM+4QDU5DE2nQ9nDuVTqobD4b8mGGyPMbIZnqyMsEcaGQy67XIw/Jw==}
azure.cosmos.database=${COSMOS_DB_DATABASE:testdb}
azure.cosmos.container=${COSMOS_DB_CONTAINER:users}

# For production CosmosDB, uncomment and set these:
# azure.cosmos.uri=${COSMOS_DB_URI:your-cosmos-uri}
# azure.cosmos.key=${COSMOS_DB_KEY:your-cosmos-key}
# azure.cosmos.database=${COSMOS_DB_DATABASE:your-database}
# azure.cosmos.container=${COSMOS_DB_CONTAINER:your-container}

# Enable web server for local testing
spring.main.web-application-type=servlet
server.port=8080

# Batch processing configuration
spring.batch.job.enabled=false

# H2 Database Configuration for Spring Batch Job Repository
spring.datasource.url=jdbc:h2:mem:batchdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# Logging for development
logging.level.root=INFO
logging.level.org.ukky.patchcosmosdbsample=DEBUG
logging.level.com.azure.cosmos=INFO
logging.level.org.springframework.batch=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
