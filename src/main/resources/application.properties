spring.application.name=patchCosmosDbSample

# CosmosDB Configuration
azure.cosmos.uri=${COSMOS_DB_URI:https://your-cosmosdb-account.documents.azure.com:443/}
azure.cosmos.key=${COSMOS_DB_KEY:your-cosmos-db-key}
azure.cosmos.database=${COSMOS_DB_DATABASE:your-database-name}
azure.cosmos.container=${COSMOS_DB_CONTAINER:your-container-name}

# Spring Batch Configuration
spring.batch.job.enabled=false
spring.batch.initialize-schema=embedded

# Logging Configuration
logging.level.org.ukky.patchcosmosdbsample=INFO
logging.level.com.azure.cosmos=WARN
logging.level.org.springframework.batch=INFO
